<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It's Working Heart</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>❤️ It's Working Heart ❤️</h1>
</header>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<!-- Song List (Generated Automatically) -->
<div class="songs" id="songs"></div>

<script>
/* ==================================================
   CHANGE ONLY THE MP3 FILE NAMES BELOW
   ================================================== */

const mp3Files = [
"song1.mp3",
"song2.mp3",
"song3.mp3",
"song4.mp3",
"song5.mp3",
"song6.mp3"
];

/* ================================================== */

const songs = document.getElementById("songs");

mp3Files.forEach((file,index)=>{

const name=file.replace(".mp3","");

songs.innerHTML+=`
<div class="song">

<span>${name}</span>

<div class="buttons">
<button onclick="togglePlay(${index},this)">▶</button>
<button onclick="toggleLoop(${index})">🔁</button>
</div>

<audio id="audio${index}">
<source src="mp3/${file}" type="audio/mpeg">
</audio>

</div>
`;

});
</script>

<script src="script.js"></script>

</body>
</html>
