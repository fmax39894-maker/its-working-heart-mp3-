<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>It's Working Heart</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#141E30,#243B55);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.player{
width:340px;
background:#ffffff15;
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}
h2{
margin-bottom:20px;
}
.visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
height:70px;
gap:5px;
margin:20px 0;
}
.bar{
width:8px;
height:20px;
background:#00e5ff;
border-radius:20px;
animation:beat .7s infinite;
animation-play-state:paused;
}
.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}
.bar:nth-child(6){animation-delay:.5s}

@keyframes beat{
0%{height:20px}
50%{height:65px}
100%{height:20px}
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

#playBtn{
background:#00c853;
color:#fff;
}

#loopBtn{
background:#2962ff;
color:#fff;
}

audio{
width:100%;
margin-top:20px;
}
</style>
</head>

<body>

<div class="player">

<h2>❤️ It's Working Heart ❤️</h2>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<button id="playBtn">▶ Play</button>
<button id="loopBtn">🔁 Loop Off</button>

<audio id="audio" controls>
<source src="mp3/song1.mp3" type="audio/mpeg">
</audio>

</div>

<script>
const audio=document.getElementById("audio");
const playBtn=document.getElementById("playBtn");
const loopBtn=document.getElementById("loopBtn");
const bars=document.querySelectorAll(".bar");

function startBars(){
bars.forEach(b=>b.style.animationPlayState="running");
}

function stopBars(){
bars.forEach(b=>b.style.animationPlayState="paused");
}

playBtn.onclick=async function(){

try{

if(audio.paused){

await audio.play();

playBtn.innerHTML="⏸ Pause";

startBars();

}else{

audio.pause();

playBtn.innerHTML="▶ Play";

stopBars();

}

}catch(e){

alert("Error: "+e.message);

}

};

loopBtn.onclick=function(){

audio.loop=!audio.loop;

loopBtn.innerHTML=audio.loop?"🔁 Loop On":"🔁 Loop Off";

};

audio.onplay=startBars;
audio.onpause=stopBars;
audio.onended=function(){
playBtn.innerHTML="▶ Play";
stopBars();
};
</script>

</body>
</html>
