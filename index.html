<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>It's Working Heart</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.player{
width:320px;
padding:20px;
border-radius:20px;
background:#222;
text-align:center;
box-shadow:0 0 20px rgba(0,255,255,.3);
}

h2{
margin-bottom:20px;
}

button{
padding:12px 20px;
margin:8px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

#playBtn{
background:#00c853;
color:white;
}

#loopBtn{
background:#2962ff;
color:white;
}

.visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
height:70px;
margin:20px 0;
gap:5px;
}

.bar{
width:8px;
height:20px;
background:#00e5ff;
animation:beat .7s infinite;
animation-play-state:paused;
}

.bar:nth-child(2){animation-delay:.1s;}
.bar:nth-child(3){animation-delay:.2s;}
.bar:nth-child(4){animation-delay:.3s;}
.bar:nth-child(5){animation-delay:.4s;}

@keyframes beat{
0%{height:20px;}
50%{height:70px;}
100%{height:20px;}
}
</style>
</head>

<body>

<div class="player">

<h2>❤️ It's Working Heart ❤️</h2>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<button id="playBtn">▶ Play</button>
<button id="loopBtn">🔁 Loop Off</button>

<audio id="audio" src="mp3/song1.mp3"></audio>

</div>

<script>

const audio=document.getElementById("audio");
const playBtn=document.getElementById("playBtn");
const loopBtn=document.getElementById("loopBtn");
const bars=document.querySelectorAll(".bar");

function startBars(){
bars.forEach(b=>b.style.animationPlayState="running");
}

function stopBars(){
bars.forEach(b=>b.style.animationPlayState="paused");
}

playBtn.onclick=()=>{

if(audio.paused){

audio.play();

playBtn.innerHTML="⏸ Pause";

startBars();

}else{

audio.pause();

playBtn.innerHTML="▶ Play";

stopBars();

}

};

loopBtn.onclick=()=>{

audio.loop=!audio.loop;

loopBtn.innerHTML=audio.loop?"🔁 Loop On":"🔁 Loop Off";

};

audio.onended=()=>{

playBtn.innerHTML="▶ Play";

stopBars();

};

</script>

</body>
</html>
